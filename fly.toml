# Fly.io deployment configuration for SARGVISION Swarm Bridge
# https://fly.io/docs/reference/configuration/

app = "sargvision-swarm-bridge"
primary_region = "bom"  # Mumbai — closest Fly region to Bengaluru CoE
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  SARGVISION_N_DRONES = "24"
  SARGVISION_SCENARIO = "border_strike"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "stop"   # scale to zero when idle (free tier friendly)
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512   # plenty for 24-drone sim at 10 Hz
